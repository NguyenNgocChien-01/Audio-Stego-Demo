version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - stego-data:/data        # giữ SQLite + uploads
    environment:
      - DB_PATH=/data/stego.db
      - UPLOAD_DIR=/data/uploads
      - FRONTEND_URL=http://localhost:3000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  stego-data:        # volume persistent, không mất khi restart