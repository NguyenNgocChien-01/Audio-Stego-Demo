services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - stego-data:/data
    environment:
      - DB_PATH=/data/stego.db
      - UPLOAD_DIR=/data/uploads
      - ALLOWED_ORIGINS=http://stegovps-audio.southeastasia.cloudapp.azure.com:3000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://stegovps-audio.southeastasia.cloudapp.azure.com:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  stego-data: