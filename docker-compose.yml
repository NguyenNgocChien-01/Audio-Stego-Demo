version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - stego-data:/data
    environment:
      - DB_PATH=/data/stego.db
      - UPLOAD_DIR=/data/uploads
      # 1. Cho phép Next.js ở local gọi vào API
      - ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # 2. Bắt buộc trình duyệt phải tìm Backend ở ngay trên máy tính của bạn
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  stego-data: